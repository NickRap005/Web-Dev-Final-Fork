<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Vocab Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #fffdf8;
      --border: #e0d9cc;
      --border-strong: #c8bfb0;
      --text: #1a1714;
      --text-muted: #7a7068;
      --text-hint: #b0a898;
      --accent: #2d5a3d;
      --accent-light: #e8f0eb;
      --danger: #8b2e2e;
      --danger-light: #f5e8e8;
      --success: #2d5a3d;
      --success-light: #e8f0eb;
      --radius: 10px;
      --radius-lg: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: 'Fraunces', serif;
      font-size: 2.4rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    header p {
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 6px;
    }

    .lang-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lang-btn {
      padding: 9px 20px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 500;
    }

    .lang-btn:hover:not(.active) {
      border-color: var(--border-strong);
      color: var(--text);
    }

    .quiz-wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .score-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .score-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 10px;
      text-align: center;
    }

    .score-card .s-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-hint);
      margin-bottom: 4px;
    }

    .score-card .s-val {
      font-family: 'Fraunces', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      font-size: 12px;
      color: var(--text-hint);
    }

    .prog-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.35s ease;
    }

    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      text-align: center;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .card .word {
      font-family: 'Fraunces', serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -1px;
    }

    .card .hint {
      font-size: 13px;
      color: var(--text-hint);
    }

    .card .translation-reveal {
      font-size: 18px;
      color: var(--accent);
      font-weight: 500;
      margin-top: 6px;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .opt {
      padding: 14px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      text-align: center;
      transition: all 0.15s;
      line-height: 1.4;
    }

    .opt:hover:not(.disabled) {
      border-color: var(--border-strong);
      background: #f5f0e8;
    }

    .opt.correct {
      background: var(--success-light);
      border-color: var(--success);
      color: var(--success);
    }

    .opt.wrong {
      background: var(--danger-light);
      border-color: var(--danger);
      color: var(--danger);
    }

    .opt.disabled { cursor: default; }

    .next-btn {
      display: none;
      padding: 11px 28px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    .next-btn:hover { opacity: 0.85; }

    .result-screen {
      text-align: center;
      padding: 3rem 1rem;
    }

    .result-screen h2 {
      font-family: 'Fraunces', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .result-screen p {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .perfect {
      color: var(--accent);
      font-weight: 500;
      margin-top: 6px;
    }

    .restart-btn {
      margin-top: 1.5rem;
      padding: 11px 28px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    .restart-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <header>
    <h1>Vocab Quiz</h1>
    <p>Pick a language and test your vocabulary</p>
  </header>

  <div class="lang-tabs" id="langTabs"></div>
  <div class="quiz-wrap" id="quizArea"></div>

  <script>
    const vocab = {
      spanish: {
        flag: "🇪🇸", label: "Spanish",
        words: [
          {word:"hablar",translation:"to speak"},{word:"comer",translation:"to eat"},
          {word:"libro",translation:"book"},{word:"agua",translation:"water"},
          {word:"amigo",translation:"friend"},{word:"casa",translation:"house"},
          {word:"tiempo",translation:"time / weather"},{word:"trabajar",translation:"to work"},
          {word:"ciudad",translation:"city"},{word:"feliz",translation:"happy"}
        ]
      },
      french: {
        flag: "🇫🇷", label: "French",
        words: [
          {word:"parler",translation:"to speak"},{word:"manger",translation:"to eat"},
          {word:"livre",translation:"book"},{word:"eau",translation:"water"},
          {word:"ami",translation:"friend"},{word:"maison",translation:"house"},
          {word:"temps",translation:"time / weather"},{word:"travailler",translation:"to work"},
          {word:"ville",translation:"city"},{word:"heureux",translation:"happy"}
        ]
      },
      italian: {
        flag: "🇮🇹", label: "Italian",
        words: [
          {word:"parlare",translation:"to speak"},{word:"mangiare",translation:"to eat"},
          {word:"libro",translation:"book"},{word:"acqua",translation:"water"},
          {word:"amico",translation:"friend"},{word:"casa",translation:"house"},
          {word:"tempo",translation:"time / weather"},{word:"lavorare",translation:"to work"},
          {word:"città",translation:"city"},{word:"felice",translation:"happy"}
        ]
      }
    };

    let lang = "spanish";
    let queue = [], current = 0, score = 0, streak = 0, answered = false;
    let currentOpts = [];

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function startQuiz() {
      queue = shuffle(vocab[lang].words);
      current = 0; score = 0; streak = 0; answered = false;
      render();
    }

    function render() {
      const area = document.getElementById("quizArea");
      if (current >= queue.length) {
        area.innerHTML = `
          <div class="result-screen">
            <h2>Quiz complete!</h2>
            <p>You scored <strong>${score}</strong> out of <strong>${queue.length}</strong>.</p>
            ${score === queue.length ? '<p class="perfect">Perfect score!</p>' : ''}
            <br><button class="restart-btn" onclick="startQuiz()">Play again</button>
          </div>`;
        return;
      }

      const item = queue[current];
      const wrong = shuffle(vocab[lang].words.filter(w => w.word !== item.word)).slice(0, 3);
      currentOpts = shuffle([item, ...wrong]);
      const pct = Math.round((current / queue.length) * 100);

      area.innerHTML = `
        <div class="score-row">
          <div class="score-card"><div class="s-label">Score</div><div class="s-val">${score}</div></div>
          <div class="score-card"><div class="s-label">Streak</div><div class="s-val">${streak}</div></div>
          <div class="score-card"><div class="s-label">Question</div><div class="s-val">${current + 1}/${queue.length}</div></div>
        </div>
        <div class="progress">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          <span>${pct}%</span>
        </div>
        <div class="card" id="wordCard">
          <div class="word">${item.word}</div>
          <div class="hint">What does this mean in English?</div>
        </div>
        <div class="options" id="opts">
          ${currentOpts.map((o, i) => `<button class="opt" onclick="choose(${i})" id="opt${i}">${o.translation}</button>`).join("")}
        </div>
        <button class="next-btn" id="nextBtn" onclick="next()">Next →</button>
      `;
    }

    function choose(idx) {
      if (answered) return;
      answered = true;
      const correct = queue[current];
      const chosen = currentOpts[idx];
      const isRight = chosen.word === correct.word;

      if (isRight) { score++; streak++; } else { streak = 0; }

      document.querySelectorAll(".opt").forEach((el, i) => {
        el.classList.add("disabled");
        if (currentOpts[i].word === correct.word) el.classList.add("correct");
        else if (i === idx && !isRight) el.classList.add("wrong");
      });

      const card = document.getElementById("wordCard");
      const rev = document.createElement("div");
      rev.className = "translation-reveal";
      rev.textContent = correct.translation;
      card.appendChild(rev);

      document.getElementById("nextBtn").style.display = "inline-block";
    }

    function next() {
      current++;
      answered = false;
      render();
    }

    function renderTabs() {
      document.getElementById("langTabs").innerHTML = Object.entries(vocab).map(([key, v]) =>
        `<button class="lang-btn ${key === lang ? 'active' : ''}" onclick="selectLang('${key}')">${v.flag} ${v.label}</button>`
      ).join("");
    }

    function selectLang(l) {
      lang = l;
      renderTabs();
      startQuiz();
    }

    renderTabs();
    startQuiz();
  </script>
</body>
</html>
